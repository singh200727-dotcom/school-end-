<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Congratulations Sis!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap");

      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #71a5f1 0%, #1651af 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
      }

      .card {
        background: white;
        padding: 3rem;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        width: 90%;
        animation: fadeIn 1.5s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        color: #2d3436;
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
      }

      .highlight {
        color: #6c5ce7;
      }

      p {
        color: #636e72;
        font-size: 1.1rem;
        line-height: 1.6;
      }

      .badge {
        background: #ffeaa7;
        color: #d63031;
        padding: 5px 15px;
        border-radius: 50px;
        font-weight: bold;
        display: inline-block;
        margin-bottom: 20px;
      }

      .btn {
        margin-top: 25px;
        padding: 12px 25px;
        background: #6c5ce7;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 1rem;
        transition: 0.3s;
      }

      .btn:hover {
        background: #a29bfe;
        transform: scale(1.05);
      }

      .photo-placeholder {
        width: 150px;
        height: 150px;
        background: #dfe6e9;
        border-radius: 50%;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border: 5px solid #6c5ce7;
      }

      img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="photo-placeholder">
        <img src="https://school-end.pages.dev/naina.png" alt="Sister's Photo" />
      </div>
      <div class="badge">Class of 2026 🎓</div>
      <h1>Congratulations, <span class="highlight">Naina Behn</span></h1>
      <p>
        12th Boards clear karne ki bahut bahut badhai! <br />
        Aapki mehnat rang layi hai. Agla chapter aur bhi awesome hone wala hai!
      </p>

      <button class="btn" onclick="celebrate()">Celebrate Again! 🎉</button>
    </div>

    <script>
      // Page load hote hi confetti chalega
      window.onload = function () {
        celebrate();
      };

      function celebrate() {
        confetti({
          particleCount: 150,
          spread: 70,
          origin: { y: 0.6 },
          colors: ["#6c5ce7", "#ff7675", "#fdcb6e"],
        });
      }
    </script>
  </body>
</html>
